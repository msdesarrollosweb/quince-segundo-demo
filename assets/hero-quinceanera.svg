<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Fondo quinceañera</title>
  <desc id="desc">Ilustración elegante de una quinceañera con vestido amplio, luces y decoración de fiesta.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#31104e"/>
      <stop offset="0.45" stop-color="#7b3ff2"/>
      <stop offset="1" stop-color="#ff8bc8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="62%">
      <stop offset="0" stop-color="#fff3fb" stop-opacity="0.78"/>
      <stop offset="0.35" stop-color="#ffd2ea" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#160d1f" stop-opacity="0"/>
